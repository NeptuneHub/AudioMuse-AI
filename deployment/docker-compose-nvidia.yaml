################################################################################
# YAML ANCHORS - Reusable Configuration Blocks
################################################################################

# Shared database credentials used by Postgres, Flask, and Worker
x-db-env: &db-env
  POSTGRES_USER: "${AUDIOMUSE_POSTGRES_USER:-audiomuse}"
  POSTGRES_PASSWORD: "${AUDIOMUSE_POSTGRES_PASSWORD:-audiomusepassword}"
  POSTGRES_DB: "${AUDIOMUSE_POSTGRES_DB:-audiomusedb}"

## AUDIOMUSE
x-audiomuse-env: &audiomuse-env
  <<: *db-env
  TZ: "${TZ:-UTC}"
  POSTGRES_HOST: "audiomuse-postgres"
  POSTGRES_PORT: "5432"
  REDIS_URL: "redis://audiomuse-redis:6379/0"
  TEMP_DIR: "/app/temp_audio"

# Shared base configuration for AudioMuse-AI services
x-audiomuse-common: &audiomuse-common
  image: ghcr.io/neptunehub/audiomuse-ai:${AUDIOMUSE_VERSION:-latest-nvidia}
  restart: unless-stopped
  depends_on:
    audiomuse-redis:
      condition: service_healthy
    audiomuse-postgres:
      condition: service_healthy
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ["0"]
            capabilities: [gpu]

################################################################################
# SERVICES
################################################################################
services:
################################################################################
### AUDIOMUSE AI - AI-powered music library management
### https://github.com/NeptuneHub/AudioMuse-AI
################################################################################
  audiomuse-redis:
    image: redis:7-alpine
    container_name: audiomuse-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    networks:
      - audiomuse
    volumes:
      - audiomuse-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  audiomuse-postgres:
    image: postgres:15-alpine
    container_name: audiomuse-postgres
    environment:
      <<: *db-env # Injects POSTGRES_USER, POSTGRES_PASSWORD, and POSTGRES_DB
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - audiomuse-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - audiomuse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AudioMuse-AI Flask application service
  audiomuse-ai-flask:
    <<: *audiomuse-common
    container_name: audiomuse-ai-flask-app
    ports:
      - "${FRONTEND_PORT:-8000}:8000"
    environment:
      <<: *audiomuse-env
      SERVICE_TYPE: "flask"
    networks:
      - audiomuse
      # - music
      # - proxy
      # - ai
    volumes:
      - audiomuse-temp-audio-flask:/app/temp_audio

  # AudioMuse-AI RQ Worker service
  audiomuse-ai-worker:
    <<: *audiomuse-common
    container_name: audiomuse-ai-worker-instance
    environment:
      <<: *audiomuse-env
      SERVICE_TYPE: "worker"
      NVIDIA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      USE_GPU_CLUSTERING: "${USE_GPU_CLUSTERING:-true}"
    networks:
      - audiomuse
      # - music
      # - ai
    volumes:
      - audiomuse-temp-audio-worker:/app/temp_audio

################################################################################
# VOLUMES
################################################################################
volumes:
  audiomuse-redis-data:
    name: audiomuse-redis-data
  audiomuse-postgres-data:
    name: audiomuse-postgres-data
  audiomuse-temp-audio-flask:
    name: audiomuse-temp-audio-flask
  audiomuse-temp-audio-worker:
    name: audiomuse-temp-audio-worker
  audiomuse-ai-cache:
    name: audiomuse-ai-cache
################################################################################
# NETWORKS
################################################################################
networks:
  # music: { external: true }
  # proxy: { external: true }
  # ai: { external: true }
  audiomuse:
