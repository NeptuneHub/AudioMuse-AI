# When an issue is closed as completed (resolved/fixed, not "not planned"),
# leave a warm thank-you for raising it. If the author already starred the repo
# we thank them for it; if not, we gently mention that a star helps the project
# grow and thank them in advance. Bots and the project's own team (owner,
# members, collaborators) are skipped so only genuine outside contributors get
# the message.

name: Thank issue authors when resolved

on:
  issues:
    types:
      - closed

permissions:
  issues: write

jobs:
  say-thanks:
    runs-on: ubuntu-latest
    steps:
      - name: Post a kind thank-you comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue = context.payload.issue;

            if (issue.state_reason !== 'completed') {
              console.log(`Issue #${issue.number} closed as "${issue.state_reason}", not completed. Skipping.`);
              return;
            }

            const author = issue.user.login;

            if (issue.user.type === 'Bot' || author.endsWith('[bot]')) {
              console.log(`Skipping bot account ${author}.`);
              return;
            }
            if (['OWNER', 'MEMBER', 'COLLABORATOR'].includes(issue.author_association)) {
              console.log(`Skipping team member ${author} (${issue.author_association}).`);
              return;
            }

            const stargazers = await github.paginate(
              github.rest.activity.listStargazersForRepo,
              { owner, repo, per_page: 100 },
            );
            const hasStarred = stargazers.some(
              (u) => u.login.toLowerCase() === author.toLowerCase(),
            );

            const thanksForStar = [
              `Hi @${author}, thank you so much for raising this issue. Taking the time to report something and help us see what could be better is a real contribution to the project, and we are genuinely grateful for it.`,
              ``,
              `We have now resolved it, but please do not hesitate to open another one if anything else comes up. It also means a lot that you already starred the project. Thank you for being part of this, it really keeps us going.`,
            ].join('\n');

            const pleaseStar = [
              `Hi @${author}, thank you so much for raising this issue. Taking the time to report something and help us see what could be better is a real contribution to the project, and we are genuinely grateful for it.`,
              ``,
              `We have now resolved it, so please do not hesitate to open another one if anything else comes up. If the project has been useful to you, would you consider giving it a star? It is a small thing, but it genuinely helps the project grow and reach more people who could benefit from it.`,
              ``,
              `Thank you so much in advance, it truly makes a difference for a project like ours.`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: hasStarred ? thanksForStar : pleaseStar,
            });
