name: Line Ending Linter
on:
  pull_request:
    branches: [ main ]

jobs:
  check-crlf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for CRLF (\r)
        run: |
          # Finds files containing Carriage Returns (\r) in scripts/configs
          # Excludes the .git folder
          BAD_FILES=$(grep -rIl $'\r' --exclude-dir=.git . || true)
          
          if [ -n "$BAD_FILES" ]; then
            echo "❌ ERROR: The following files contain Windows line endings (CRLF):"
            echo "$BAD_FILES"
            echo ""
            echo "To fix this, run 'git add --renormalize .' on your machine and commit."
            exit 1
          else
            echo "✅ All files use Unix line endings (LF)."
          fi
